controller_manager:
  ros__parameters:
    update_rate: 50
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    thruster_controller:
      type: diff_drive_controller/DiffDriveController
      left_wheel: left_thruster_joint
      right_wheel: right_thruster_joint
      cmd_vel_timeout: 0.5
      publish_rate: 50
      wheel_separation: 0.8
      wheel_radius: 0.05
