ekf_local:
  ros__parameters:
    frequency: 30.0             # Match your IMU's actual 20Hz rate
    predict_to_current_time: true
    use_sim_time: false
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true
    permit_corrected_publication: false

    
    map_frame: 'map'
    odom_frame: 'odom'
    base_link_frame: 'base_link'
    world_frame: 'odom'

    # GPS Velocity
    # twist0: '/gps_bow/velocity'
    # twist0_config: [false, false, false, 
    #                 false, false, false, 
    #                 false,  false,  false, 
    #                 false, false, false, 
    #                 false, false, false]
    # twist0_qos: "reliable"

    # IMU Data
    imu0: '/imu_bow/data'
    imu0_config: [false, false, false, 
                    false, false, true,    # Yaw
                    false, false, false, 
                    false, false, true,    # Angular Velocity
                    true, true, false]
    imu0_queue_size: 10                     # Keep this low to prevent backlog

    # --- SIMPLIFIED DIAGONAL MATRICES ---
    # [X, Y, Z, roll, pitch, yaw, vX, vY, vZ, vRoll, vPitch, vYaw, aX, aY, aZ]
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06, 
                               0.05, 0.05, 0.04, 0.01, 0.01, 0.02, 
                               0.01, 0.01, 0.015]

    # Use 1e-6 instead of 1e-9 for better numerical stability
    initial_estimate_covariance: [1.0, 1.0, 1e-6, 1e-6, 1e-6, 1.0, 
                                 1e-6, 1e-6, 1e-6, 1e-6, 1e-6, 1.0, 
                                 1.0, 1.0, 1e-6]