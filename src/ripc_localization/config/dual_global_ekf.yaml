ekf_global:
  ros__parameters:
    'frequency': 10.0
    'predict_to_current_time': true
    'use_sim_time': false
    'sensor_timeout': 0.1
    'two_d_mode': True
    'publish_tf': True
    'print_diagnostics': True

    'map_frame': 'map'
    'odom_frame': 'odom'
    'base_link_frame': 'base_link'
    'world_frame': 'map'

    'odom0': '/odometry/gps_bow'
    'odom0_config': [True, True, False, 
                    False, False, False, 
                    False, False, False, 
                    False, False, False, 
                    False, False, False]
    'odom0_differential': False
    'odom0_relative': False
    'odom0_queue_size': 10

    # 'odom1': '/odometry/gps_stern'
    # 'odom1_config': [True, True, False, 
    #                 False, False, False, 
    #                 false, false, False, 
    #                 False, False, False, 
    #                 False, False, False]
    # 'odom1_differential': False
    # 'odom1_relative': False
    # 'odom1_queue_size': 10

    # 'twist0': '/gps_bow/velocity'
    # 'twist0_config': [False, False, False, 
    #                 False, False, False, 
    #                 True, True, False, 
    #                 False, False, False, 
    #                 False, False, False]
    # 'twist0_differential': False
    # 'twist0_relative': False
    # 'twist0_queue_size': 10
    # 'twist0_qos': "reliable"

    # twist1': '/gps_stern/velocity'
    # 'twist1_config': [False, False, False, 
    #                 False, False, False, 
    #                 True, True, False, 
    #                 False, False, False, 
    #                 False, False, False]
    # 'twist1_differential': False
    # 'twist1_relative': False
    # 'twist1_queue_size': 10
    # 'twist1_qos': "reliable"

    'imu0': '/imu_bow/data'
    'imu0_config': [False, False, False, 
                    False, False, True, 
                    False, False, False, 
                    False, False, True, 
                    True, True, False]
    'imu0_differential': False
    'imu0_relative': False
    'imu0_queue_size': 10
    'imu0_remove_gravitational_acceleration': True

    imu0_pose_rejection_threshold: 0.0
    imu0_angular_velocity_rejection_threshold: 0.0

    'imu1': '/imu_stern/data'
    'imu1_config': [False, False, False, 
                    False, False, False, 
                    False, False, False, 
                    False, False, True, 
                    True, True, False]
    'imu1_differential': False
    'imu1_relative': False
    'imu1_queue_size': 10
    'imu1_remove_gravitational_acceleration': True

    imu1_pose_rejection_threshold: 0.0
    imu1_angular_velocity_rejection_threshold: 0.0

     # --- SIMPLIFIED DIAGONAL MATRICES ---
    # [X, Y, Z, roll, pitch, yaw, vX, vY, vZ, vRoll, vPitch, vYaw, aX, aY, aZ]
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06, 
                               0.05, 0.05, 0.04, 0.01, 0.01, 0.02, 
                               0.01, 0.01, 0.015]

    # Starting with 10.0 for X,Y,Yaw is good—it tells the EKF to snap to GPS immediately.
    # Switched 1e-9 to 1e-6 for numerical stability (prevents NaNs).
    initial_estimate_covariance: [10.0, 10.0, 1e-6, 1e-6, 1e-6, 10.0, 
                                 1e-6, 1e-6, 1e-6, 1e-6, 1e-6, 10.0, 
                                 1.0, 1.0, 1e-6]

