ekf_local:
  ros__parameters:
   # --- LOCAL EKF PARAMETERS ---
    'frequency': 30.0
    'predict_to_current_time': true
    'use_sim_time': false
    'sensor_timeout': 0.1
    'two_d_mode': True
    'transform_time_offset': 0.0
    'transform_timeout': 0.0
    'publish_tf': True
    'print_diagnostics': True

    'map_frame': 'map'
    'odom_frame': 'odom'
    'base_link_frame': 'base_link'
    'world_frame': 'odom'

    # 'twist0': '/gps_bow/velocity'
    # 'twist0_config': [false, false, false, 
    #                 false, false, false, 
    #                 true,  true,  false, 
    #                 false, false, false, 
    #                 false, false, false]
    # 'twist0_differential': false
    # 'twist0_relative': false
    # 'twist0_qos': "reliable"

    # 'twist1': '/gps_stern/velocity'
    # 'twist1_config': [false, false, false, 
    #                 false, false, false, 
    #                 true,  true,  false, 
    #                 false, false, false, 
    #                 false, false, false]
    # 'twist1_differential': false
    # 'twist1_relative': false
    # 'twist1_qos': "reliable"


    'imu0': '/imu_bow/data'
    'imu0_config': [False, False, False, 
                    False, False, True, 
                    False, False, False, 
                    False, False, True, 
                    False, False, False]
    'imu0_differential': False
    'imu0_relative': False
    'imu0_queue_size': 10  

    'imu1': '/imu_stern/data'
    'imu1_config': [False, False, False, 
                    False, False, True, 
                    False, False, False, 
                    False, False, True, 
                    False, False, False]
    'imu1_differential': False
    'imu1_relative': False
    'imu1_queue_size': 10  

    # --- SIMPLIFIED DIAGONAL MATRICES ---
    # [X, Y, Z, roll, pitch, yaw, vX, vY, vZ, vRoll, vPitch, vYaw, aX, aY, aZ]
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06, 
                               0.05, 0.05, 0.04, 0.01, 0.01, 0.02, 
                               0.01, 0.01, 0.015]

    # Use 1e-6 instead of 1e-9 for better numerical stability
    initial_estimate_covariance: [1.0, 1.0, 1e-6, 1e-6, 1e-6, 1.0, 
                                 1e-6, 1e-6, 1e-6, 1e-6, 1e-6, 1.0, 
                                 1.0, 1.0, 1e-6]