ekf_filter_node_local:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    world_frame: odom
    odom_frame: odom
    base_link_frame: base_link

    predict_to_current_time: true
    dynamic_process_noise_covariance: true

    # GPS 
    odom0: /odometry/gps
    odom0_config: [false, false, false,   # Position (X,Y,Z)
                   false, false, false,   # Roll, Pitch, Yaw
                   false, false,  false,   # Velocity (xdot, ydot, zdot)
                   false, false, false,   # Angular Velocity 
                   false, false, false]   # Linear Acceleration
    odom0_relative: true

    # Bow IMU
    imu0: /imu2/data
    imu0_config: [false, false, false, 
                  false,  false,  true,
                  false, false, false,
                  false,  false,  true,
                  true, true, false]
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
    imu0_qos: best_effort

    # Stern IMU
    #imu1: /model/ripc_usv/imu_stern
    imu1_config: [false, false, false,
                  false,  false,  true,
                  false, false, false,
                  false,  false,  true,
                  true, true, false]
    imu1_relative: false
    imu1_remove_gravitational_acceleration: true
    imu1_qos: best_effort


      